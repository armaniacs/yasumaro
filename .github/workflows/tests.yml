name: Tests

on:
  pull_request:

permissions:
  contents: read
  issues: write

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  a11y:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: '24', cache: 'npm' }

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build extension
        run: npm run build

      - name: Accessibility checks (axe-core)
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" npx playwright test --config testDir/playwright.config.ts --grep @a11y

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-a11y-report
          path: playwright-report/
          retention-days: 7

  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: '24', cache: 'npm' }

      - run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Type check
        id: type-check
        run: npm run type-check

      - name: Run tests
        id: run-tests
        run: npm test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build extension
        run: npm run build

      - name: Extension E2E tests
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" npx playwright test --grep @extension

      - name: Comment PR with results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.startsWith('### Validation Results')
            );

            const typeCheckOk = steps['type-check'].outcome === 'success';
            const testsOk = steps['run-tests'].outcome === 'success';
            const result = typeCheckOk && testsOk ? '✅ All checks passed!' : '❌ Some checks failed.';

            const body = [
              '### Validation Results',
              '',
              '**Status:** ' + result,
              '',
              '| Check | Status |',
              '|-------|--------|',
              '| Type Check | ' + steps['type-check'].outcome + ' |',
              '| Tests | ' + steps['run-tests'].outcome + ' |',
              '',
              '[View details in the logs](https://github.com/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + ')',
            ].join('\n');

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
