name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          cache: 'npm'
      - name: Cache node_modules
        id: cache-npm
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Install dependencies
        run: npm ci
      - name: Extract version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Check if minor version is even
        id: minor_check
        run: |
          MINOR=$(echo "${{ steps.version.outputs.version }}" | cut -d. -f2)
          if [ $((MINOR % 2)) -eq 0 ]; then
            echo "is_even=true" >> $GITHUB_OUTPUT
          else
            echo "is_even=false" >> $GITHUB_OUTPUT
          fi
          echo "Minor version: ${MINOR} (even: $((MINOR % 2 == 0)))"
      - name: Build for Chrome
        run: npx wxt zip -b chrome
      - name: Check bundle size (M26)
        run: npm run check-bundle-size -- chrome-mv3
      - name: Sign CRX with private key
        env:
          CRX_PRIVATE_KEY: ${{ secrets.CRX_PRIVATE_KEY }}
        run: |
          echo "${CRX_PRIVATE_KEY}" > /tmp/private.pem
          node .github/workflows/build-crx2.mjs \
            dist/yasumaro-${{ steps.version.outputs.version }}-chrome.zip \
            /tmp/private.pem \
            dist/yasumaro-${{ steps.version.outputs.version }}-chrome.crx
          rm /tmp/private.pem
      - name: Build for Firefox
        run: npx wxt zip -b firefox
      - name: Build for Edge
        run: npx wxt zip -b edge
      - name: List output archives
        run: ls -la dist/*.zip dist/*.crx
      - name: Create Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          name: v${{ steps.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          body: |
            ## Yasumaro v${{ steps.version.outputs.version }}

            See [CHANGELOG.md](https://github.com/armaniacs/Yasumaro/blob/main/CHANGELOG.md) for details.
          files: |
            dist/yasumaro-${{ steps.version.outputs.version }}-chrome.zip
            dist/yasumaro-${{ steps.version.outputs.version }}-chrome.crx
            dist/yasumaro-${{ steps.version.outputs.version }}-firefox.zip
            dist/yasumaro-${{ steps.version.outputs.version }}-edge.zip
          draft: false
          prerelease: false

      - name: Publish to Chrome Web Store
        if: steps.minor_check.outputs.is_even == 'true'
        env:
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: |
          FULL_RESP=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d "client_id=${CHROME_CLIENT_ID}&client_secret=${CHROME_CLIENT_SECRET}&refresh_token=${CHROME_REFRESH_TOKEN}&grant_type=refresh_token")
          ACCESS_TOKEN=$(echo "${FULL_RESP}" | python3 -c "import sys,json; print(json.load(sys.stdin).get('access_token',''))")
          if [ -z "${ACCESS_TOKEN}" ]; then
            echo "Auth failed. Full response:"
            echo "${FULL_RESP}" | python3 -m json.tool
            exit 1
          fi

          CRX_FILE="dist/yasumaro-${{ steps.version.outputs.version }}-chrome.crx"
          python3 -c "import struct;f=open('${CRX_FILE}','rb');d=f.read(16);f.seek(0,2);print('CRX ok' if d[:4]==b'Cr24' and struct.unpack('<I',d[4:8])[0]==3 else 'BAD')"

          UPLOAD_RESP=$(curl -s -X PUT \
            "https://www.googleapis.com/upload/chromewebstore/v1.1/items/${CHROME_EXTENSION_ID}" \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -H "Content-Type: application/octet-stream" \
            -T "${CRX_FILE}")
          UPLOAD_STATUS=$(echo "${UPLOAD_RESP}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('uploadState','UNKNOWN'))")
          echo "Upload: ${UPLOAD_STATUS}"
          if [ "${UPLOAD_STATUS}" != "SUCCESS" ] && [ "${UPLOAD_STATUS}" != "IN_PROGRESS" ]; then
            echo "Error detail:"
            echo "${UPLOAD_RESP}" | python3 -c "import sys,json; [print(e.get('error_code','?'),e.get('error_detail','')) for e in json.load(sys.stdin).get('itemError',[])]"
            exit 1
          fi

          PUBLISH_RESP=$(curl -s -X POST \
            "https://www.googleapis.com/chromewebstore/v1.1/items/${CHROME_EXTENSION_ID}/publish" \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -H "x-goog-api-version: 2" \
            -H "Content-Length: 0")
          PUBLISH_STATUS=$(echo "${PUBLISH_RESP}" | python3 -c "import sys,json; d=json.load(sys.stdin); s=d.get('status',[]); print((s[0] if s else 'UNKNOWN') if isinstance(s,list) else (s or 'UNKNOWN'))")
          echo "Publish: ${PUBLISH_STATUS}"
          if [ "${PUBLISH_STATUS}" != "OK" ] && [ "${PUBLISH_STATUS}" != "IN_REVIEW" ]; then exit 1; fi
          echo "✅ Published"
