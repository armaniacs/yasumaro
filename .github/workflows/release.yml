name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          cache: 'npm'
      - name: Cache node_modules
        id: cache-npm
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Install dependencies
        run: npm ci
      - name: Extract version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Check if minor version is even
        id: minor_check
        run: |
          MINOR=$(echo "${{ steps.version.outputs.version }}" | cut -d. -f2)
          if [ $((MINOR % 2)) -eq 0 ]; then
            echo "is_even=true" >> $GITHUB_OUTPUT
          else
            echo "is_even=false" >> $GITHUB_OUTPUT
          fi
          echo "Minor version: ${MINOR} (even: $((MINOR % 2 == 0)))"
      - name: Build for Chrome
        run: npx wxt zip -b chrome
      - name: Check bundle size (M26)
        run: npm run check-bundle-size -- chrome-mv3
      - name: Sign CRX with private key
        env:
          CRX_PRIVATE_KEY: ${{ secrets.CRX_PRIVATE_KEY }}
        run: |
          echo "${CRX_PRIVATE_KEY}" > /tmp/private.pem
          npx crx3 dist/chrome-mv3/ \
            --key /tmp/private.pem \
            --crx dist/yasumaro-${{ steps.version.outputs.version }}-chrome.crx
          rm /tmp/private.pem
      - name: Build for Firefox
        run: npx wxt zip -b firefox
      - name: Build for Edge
        run: npx wxt zip -b edge
      - name: List output archives
        run: ls -la dist/*.zip dist/*.crx
      - name: Create Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          name: v${{ steps.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          body: |
            ## Yasumaro v${{ steps.version.outputs.version }}

            See [CHANGELOG.md](https://github.com/armaniacs/Yasumaro/blob/main/CHANGELOG.md) for details.
          files: |
            dist/yasumaro-${{ steps.version.outputs.version }}-chrome.zip
            dist/yasumaro-${{ steps.version.outputs.version }}-chrome.crx
            dist/yasumaro-${{ steps.version.outputs.version }}-firefox.zip
            dist/yasumaro-${{ steps.version.outputs.version }}-edge.zip
          draft: false
          prerelease: false

      - name: Publish to Chrome Web Store
        if: steps.minor_check.outputs.is_even == 'true'
        env:
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: |
          # Use Google's official chrome-webstore-upload-cli
          npx @google/chrome-webstore-upload-cli@latest upload \
            --item-id "${EXTENSION_ID}" \
            --client-id "${CLIENT_ID}" \
            --client-secret "${CLIENT_SECRET}" \
            --refresh-token "${REFRESH_TOKEN}" \
            --file "dist/yasumaro-${{ steps.version.outputs.version }}-chrome.zip" 2>&1 || {
            echo "⚠️ ZIP upload failed, trying CRX..."
            npx @google/chrome-webstore-upload-cli@latest upload \
              --item-id "${EXTENSION_ID}" \
              --client-id "${CLIENT_ID}" \
              --client-secret "${CLIENT_SECRET}" \
              --refresh-token "${REFRESH_TOKEN}" \
              --file "dist/yasumaro-${{ steps.version.outputs.version }}-chrome.crx" 2>&1
          }

          # Publish
          npx @google/chrome-webstore-upload-cli@latest publish \
            --item-id "${EXTENSION_ID}" \
            --client-id "${CLIENT_ID}" \
            --client-secret "${CLIENT_SECRET}" \
            --refresh-token "${REFRESH_TOKEN}" 2>&1
